openapi: 3.0.3
info:
  title: Transfa Backend API
  version: 1.0.0
  license:
    name: Proprietary
  description: |
    Consolidated OpenAPI spec for all HTTP services in `transfa-backend`.

    Services covered:
    - `auth-service`
    - `account-service`
    - `transaction-service`
    - `platform-fee-service`
    - `notification-service`

    Note:
    - Some error responses are plain text in current handlers.
    - Internal endpoints require `X-Internal-API-Key`.

tags:
  - name: Health
  - name: Auth
  - name: Onboarding
  - name: User
  - name: Account
  - name: Beneficiaries
  - name: Banks
  - name: Transactions
  - name: Payment Requests
  - name: Notifications
  - name: Transfer Lists
  - name: Money Drops
  - name: Platform Fees
  - name: Webhooks
  - name: Internal

servers:
  - url: https://auth-service-production-dac4.up.railway.app
    description: Auth service
  - url: https://transaction-service-production-a8d9.up.railway.app
    description: Transaction service
  - url: https://platform-fee-service-production.up.railway.app
    description: Platform fee service
  - url: https://notification-service-production-88c4.up.railway.app
    description: Notification service
  - url: https://account-service-production-8e34.up.railway.app
    description: Account service

paths:
  /health:
    get:
      tags: [Health]
      summary: Service health check
      security: []
      description: |
        Health endpoint shared by multiple services. Response payload can differ slightly
        by service instance.
      operationId: healthCheck
      responses:
        '200':
          description: Service healthy
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/HealthJSON'
                  - type: string
            text/plain:
              schema:
                type: string

  /onboarding/account-types:
    get:
      tags: [Onboarding]
      summary: List onboarding account type options
      operationId: getOnboardingAccountTypes
      servers:
        - url: https://auth-service-production-dac4.up.railway.app
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Account type options
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountTypeOptionsResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'

  /onboarding:
    post:
      tags: [Onboarding]
      summary: Submit Tier 1 onboarding
      operationId: submitOnboarding
      servers:
        - url: https://auth-service-production-dac4.up.railway.app
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OnboardingPayload'
      responses:
        '201':
          description: Tier 1 onboarding accepted for a new user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingResponse'
        '200':
          description: Tier 1 already exists for this user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'

  /onboarding/tier1/update:
    post:
      tags: [Onboarding]
      summary: Update Tier 1 profile and trigger re-processing
      operationId: updateTier1Profile
      servers:
        - url: https://auth-service-production-dac4.up.railway.app
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OnboardingPayload'
      responses:
        '202':
          description: Tier 1 update queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '412':
          $ref: '#/components/responses/ErrorResponse'

  /onboarding/tier2:
    post:
      tags: [Onboarding]
      summary: Submit Tier 2 verification details
      operationId: submitTier2Verification
      servers:
        - url: https://auth-service-production-dac4.up.railway.app
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Tier2VerificationPayload'
      responses:
        '202':
          description: Tier 2 verification queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '412':
          $ref: '#/components/responses/ErrorResponse'

  /onboarding/tier3:
    post:
      tags: [Onboarding]
      summary: Submit Tier 3 verification details
      operationId: submitTier3Verification
      servers:
        - url: https://auth-service-production-dac4.up.railway.app
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Tier3UpgradePayload'
      responses:
        '202':
          description: Tier 3 verification queued or still processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '200':
          description: Tier 3 already completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '412':
          $ref: '#/components/responses/ErrorResponse'

  /onboarding/progress:
    post:
      tags: [Onboarding]
      summary: Save onboarding progress draft
      operationId: saveOnboardingProgress
      servers:
        - url: https://auth-service-production-dac4.up.railway.app
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OnboardingProgressPayload'
      responses:
        '204':
          description: Progress saved
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'

  /onboarding/progress/clear:
    post:
      tags: [Onboarding]
      summary: Clear onboarding progress draft
      operationId: clearOnboardingProgress
      servers:
        - url: https://auth-service-production-dac4.up.railway.app
      security:
        - BearerAuth: []
      responses:
        '204':
          description: Progress cleared
        '401':
          $ref: '#/components/responses/ErrorResponse'

  /onboarding/status:
    get:
      tags: [Onboarding]
      summary: Fetch onboarding status
      operationId: getOnboardingStatus
      servers:
        - url: https://auth-service-production-dac4.up.railway.app
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Onboarding status state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingStatusResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'

  /me/profile:
    get:
      tags: [User]
      summary: Get current authenticated user profile
      operationId: getMeProfile
      servers:
        - url: https://auth-service-production-dac4.up.railway.app
      security:
        - BearerAuth: []
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /me/security-status:
    get:
      tags: [User]
      summary: Get security setup status for current user
      operationId: getSecurityStatus
      servers:
        - url: https://auth-service-production-dac4.up.railway.app
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Security status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecurityStatusResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'

  /me/kyc-status:
    get:
      tags: [User]
      summary: Get KYC stage statuses and inferred tier
      operationId: getKycStatus
      servers:
        - url: https://auth-service-production-dac4.up.railway.app
      security:
        - BearerAuth: []
      responses:
        '200':
          description: KYC status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KycStatusResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'

  /users/search:
    get:
      tags: [User]
      summary: Search users by username/fullname
      operationId: searchUsers
      servers:
        - url: https://auth-service-production-dac4.up.railway.app
      security:
        - BearerAuth: []
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
            maxLength: 64
          description: Search query
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 20
      responses:
        '200':
          description: Matched users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDiscoveryResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /users/frequent:
    get:
      tags: [User]
      summary: List frequent transfer recipients
      operationId: listFrequentUsers
      servers:
        - url: https://auth-service-production-dac4.up.railway.app
      security:
        - BearerAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 6
            minimum: 1
            maximum: 12
      responses:
        '200':
          description: Frequent users list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDiscoveryResponse'

  /me/username:
    post:
      tags: [User]
      summary: Set username for current user
      operationId: setUsername
      servers:
        - url: https://auth-service-production-dac4.up.railway.app
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetUsernamePayload'
      responses:
        '200':
          description: Username set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetUsernameResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'
        '412':
          $ref: '#/components/responses/ErrorResponse'

  /me/transaction-pin:
    post:
      tags: [User]
      summary: Set transaction PIN for current user
      operationId: setTransactionPin
      servers:
        - url: https://auth-service-production-dac4.up.railway.app
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetTransactionPinPayload'
      responses:
        '200':
          description: PIN set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '412':
          $ref: '#/components/responses/ErrorResponse'

  /me/pin-change/complete:
    post:
      tags: [User]
      summary: Change transaction PIN
      description: Requires recent step-up re-verification in Clerk session metadata.
      operationId: completePinChange
      servers:
        - url: https://auth-service-production-dac4.up.railway.app
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompletePinChangePayload'
      responses:
        '200':
          description: PIN changed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '412':
          $ref: '#/components/responses/ErrorResponse'
        '423':
          $ref: '#/components/responses/ErrorResponse'

  /me/primary-account:
    get:
      tags: [User]
      summary: Get primary account details for current user
      operationId: getPrimaryAccount
      servers:
        - url: https://auth-service-production-dac4.up.railway.app
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Primary account details (can be empty object)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrimaryAccountDetails'

  /auth/session:
    get:
      tags: [Auth]
      summary: Get authenticated session bootstrap payload
      operationId: getAuthSession
      servers:
        - url: https://auth-service-production-dac4.up.railway.app
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Session state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionResponse'

  /beneficiaries:
    get:
      tags: [Beneficiaries]
      summary: List beneficiaries
      operationId: listBeneficiaries
      servers:
        - url: https://account-service-production-8e34.up.railway.app
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Beneficiaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Beneficiary'
    post:
      tags: [Beneficiaries]
      summary: Create beneficiary
      operationId: createBeneficiary
      servers:
        - url: https://account-service-production-8e34.up.railway.app
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddBeneficiaryPayload'
      responses:
        '201':
          description: Beneficiary created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Beneficiary'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '412':
          $ref: '#/components/responses/ErrorResponse'

  /beneficiaries/verify:
    post:
      tags: [Beneficiaries]
      summary: Verify beneficiary account details before linking
      operationId: verifyBeneficiary
      servers:
        - url: https://account-service-production-8e34.up.railway.app
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyBeneficiaryAccountPayload'
      responses:
        '200':
          description: Beneficiary account details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyBeneficiaryAccountResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /beneficiaries/{id}:
    delete:
      tags: [Beneficiaries]
      summary: Delete beneficiary
      operationId: deleteBeneficiary
      servers:
        - url: https://account-service-production-8e34.up.railway.app
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Deleted
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /banks:
    get:
      tags: [Banks]
      summary: List supported banks
      operationId: listBanks
      servers:
        - url: https://account-service-production-8e34.up.railway.app
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Bank list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BanksResponse'

  /internal/accounts/money-drop:
    post:
      tags: [Internal, Account]
      summary: Create money-drop account for a user
      operationId: createMoneyDropAccountInternal
      servers:
        - url: https://account-service-production-8e34.up.railway.app
      security:
        - InternalApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMoneyDropAccountRequest'
      responses:
        '200':
          description: Money-drop account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'

  /transactions/health:
    get:
      tags: [Health]
      summary: Transaction service health check
      operationId: getTransactionsHealth
      servers:
        - url: https://transaction-service-production-a8d9.up.railway.app
      security: []
      responses:
        '200':
          description: Healthy response
          content:
            text/plain:
              schema:
                type: string

  /transactions/p2p:
    post:
      tags: [Transactions]
      summary: Initiate P2P transfer
      operationId: createP2PTransfer
      servers:
        - url: https://transaction-service-production-a8d9.up.railway.app
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/P2PTransferPayload'
      responses:
        '201':
          description: Transfer initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '402':
          $ref: '#/components/responses/ErrorResponse'

  /transactions/p2p/bulk:
    post:
      tags: [Transactions]
      summary: Initiate bulk P2P transfer batch
      operationId: createBulkP2PTransfer
      servers:
        - url: https://transaction-service-production-a8d9.up.railway.app
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkP2PTransferPayload'
      responses:
        '200':
          description: Batch transfer result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkP2PTransferResponse'

  /transactions/self-transfer:
    post:
      tags: [Transactions]
      summary: Initiate self transfer to linked beneficiary
      operationId: createSelfTransfer
      servers:
        - url: https://transaction-service-production-a8d9.up.railway.app
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SelfTransferPayload'
      responses:
        '201':
          description: Transfer initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'

  /transactions/beneficiaries:
    get:
      tags: [Transactions]
      summary: List beneficiaries resolved by transaction service
      operationId: listTransactionBeneficiaries
      servers:
        - url: https://transaction-service-production-a8d9.up.railway.app
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Beneficiaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Beneficiary'

  /transactions/beneficiaries/default:
    get:
      tags: [Transactions]
      summary: Get default beneficiary
      operationId: getDefaultBeneficiary
      servers:
        - url: https://transaction-service-production-a8d9.up.railway.app
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Default beneficiary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Beneficiary'
    put:
      tags: [Transactions]
      summary: Set default beneficiary
      operationId: setDefaultBeneficiary
      servers:
        - url: https://transaction-service-production-a8d9.up.railway.app
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetDefaultBeneficiaryPayload'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /transactions/receiving-preference:
    get:
      tags: [Transactions]
      summary: Get receiving preference
      operationId: getReceivingPreference
      servers:
        - url: https://transaction-service-production-a8d9.up.railway.app
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Receiving preference
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReceivingPreference'
    put:
      tags: [Transactions]
      summary: Update receiving preference
      operationId: updateReceivingPreference
      servers:
        - url: https://transaction-service-production-a8d9.up.railway.app
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateReceivingPreferencePayload'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /transactions/account/balance:
    get:
      tags: [Transactions]
      summary: Get account balance
      operationId: getAccountBalance
      servers:
        - url: https://transaction-service-production-a8d9.up.railway.app
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Balance details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountBalance'

  /transactions/fees:
    get:
      tags: [Transactions]
      summary: Get configured fees
      operationId: getFees
      servers:
        - url: https://transaction-service-production-a8d9.up.railway.app
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Fee settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeeResponse'

  /transactions/transactions:
    get:
      tags: [Transactions]
      summary: List transaction history
      operationId: listTransactions
      servers:
        - url: https://transaction-service-production-a8d9.up.railway.app
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Transaction history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TransactionHistoryItem'

  /transactions/transactions/with/{username}:
    get:
      tags: [Transactions]
      summary: Get bilateral transaction history with a user
      operationId: getTransactionsWithUser
      servers:
        - url: https://transaction-service-production-a8d9.up.railway.app
      security:
        - BearerAuth: []
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
      responses:
        '200':
          description: Bilateral history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BilateralTransactionHistoryResponse'

  /transactions/transactions/{id}:
    get:
      tags: [Transactions]
      summary: Get transaction by ID
      operationId: getTransactionById
      servers:
        - url: https://transaction-service-production-a8d9.up.railway.app
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Transaction details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionHistoryItem'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /transactions/payment-requests:
    get:
      tags: [Payment Requests]
      summary: List creator-owned payment requests
      operationId: listPaymentRequests
      servers:
        - url: https://transaction-service-production-a8d9.up.railway.app
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
        - name: q
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Payment requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PaymentRequest'
