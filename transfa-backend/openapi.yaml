components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    InternalApiKey:
      type: apiKey
      in: header
      name: X-Internal-API-Key
    AnchorWebhookSignature:
      type: apiKey
      in: header
      name: x-anchor-signature

  parameters:
    LimitParam:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
      description: Page size limit.
    OffsetParam:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
      description: Pagination offset.
    RequestIdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    ErrorResponse:
      description: Error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
        text/plain:
          schema:
            type: string

  schemas:
    HealthJSON:
      type: object
      properties:
        status:
          type: string
      additionalProperties: true

    ErrorResponse:
      oneOf:
        - type: object
          properties:
            error:
              type: string
          required: [error]
        - type: string

    StatusResponse:
      type: object
      properties:
        status:
          type: string
      required: [status]
      additionalProperties: true

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    UpdatedBooleanResponse:
      type: object
      properties:
        updated:
          type: boolean
      required: [updated]

    UpdatedCountResponse:
      type: object
      properties:
        updated:
          type: integer
      required: [updated]

    OnboardingPayload:
      type: object
      properties:
        user_type:
          type: string
          enum: [personal, merchant]
        phone_number:
          type: string
          description: Nigerian phone number (e.g. 07012345678)
        email:
          type: string
          format: email
        kyc_data:
          type: object
          additionalProperties: true
          description: Tier-specific KYC fields.
      required: [user_type, phone_number, kyc_data]

    OnboardingResponse:
      type: object
      properties:
        user_id:
          type: string
        status:
          type: string
        anchor_customer_id:
          type: string
      required: [user_id, status]

    AccountTypeOption:
      type: object
      properties:
        type:
          type: string
          enum: [personal, merchant]
        title:
          type: string
        description:
          type: string
